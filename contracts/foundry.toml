[profile.default]
src     = "."
out     = "out"
libs    = ["lib"]
skip    = ["lib/**"]
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
]
solc    = "0.8.27"
optimizer       = true
optimizer_runs  = 200
via_ir          = true

[profile.default.fuzz]
runs = 1000

[fmt]
line_length   = 100
tab_width     = 4
bracket_spacing = true
